# FakeOrg assessment — executive narrative (SYNTHETIC)

executive_summary: >
  FakeOrg has adopted AI quickly and from the bottom up, but governance has not kept pace.
  There is no executive owner for AI risk, no approved AI policy, and — until this engagement —
  no inventory of where AI is used. Maturity against the NIST AI RMF is low overall, weakest in
  the MEASURE function, where there is essentially no testing, monitoring, or bias evaluation.
  The most urgent exposure is the AI resume-screening tool: it is high-risk under the EU AI Act
  (Annex III employment) yet operates with no bias testing, no human-oversight procedure, no
  candidate notification, and no Fundamental Rights Impact Assessment. The good news is that
  FakeOrg's existing security and privacy programs provide partial coverage to build on, and the
  improvement roadmap below sequences the highest-severity fixes first.

key_findings:
  - No executive ownership or committee for AI risk; governance is ad hoc.
  - The AI acceptable-use policy is an unapproved draft with no high-risk provisions.
  - The high-risk resume-screening tool lacks bias testing, human oversight, and candidate notice.
  - No Fundamental Rights Impact Assessment exists for the high-risk use case (EU AI Act Art 27).
  - MEASURE is the weakest function — no AI testing, monitoring, or metrics across the board.
  - Existing vendor-security and GDPR programs give a foundation to extend to AI-specific risk.
